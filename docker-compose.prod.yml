version: '3.8'

services:
  frontend:
    image: ushankamesh33/medifind-frontend:latest
    container_name: medifind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ushankamesh33/medifind-backend:latest
    container_name: medifind-backend
    ports:
      - "5000:5000"
    environment:
      - MYSQL_ROOT_PASSWORD=@Kamesh9396164
      - DB_HOST=db
      - DB_USER=root
      - DB_PASSWORD=@Kamesh9396164
      - DB_NAME=healthdb
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: medifind-db
    environment:
      MYSQL_ROOT_PASSWORD: "@Kamesh9396164"
      MYSQL_DATABASE: healthdb
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p@Kamesh9396164"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

volumes:
  mysql-data:
